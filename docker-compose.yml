services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: execsql
      POSTGRES_PASSWORD: execsql
      POSTGRES_DB: execsql_test
    ports:
      - "${EXECSQL_PG_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U execsql -d execsql_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: execsql
      MYSQL_PASSWORD: execsql
      MYSQL_DATABASE: execsql_test
    ports:
      - "${EXECSQL_MYSQL_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
